name: Build APK

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              TAG="v1.0.0"
            else
              IFS='.' read -r major minor patch <<< "${LATEST#v}"
              TAG="v${major}.${minor}.$((patch + 1))"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "code=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate icons from repo assets
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p android/app/src/main/res/mipmap-{hdpi,xhdpi,xxhdpi,xxxhdpi}
          convert icon-512.png -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon-512.png -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon-512.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon-512.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Decode persistent signing key
        working-directory: android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASS: debtfree
          KEY_ALIAS: release
          KEY_PASS: debtfree
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk debt-freedom.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: debt-freedom-apk
          path: debt-freedom.apk

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" debt-freedom.apk \
            --title "Debt Freedom $TAG" \
            --generate-notes
